name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./internal/... -v -race

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COMMIT=$(git rev-parse --short HEAD)
          go build \
            -ldflags "-s -w -X main.Version=$VERSION -X main.BuildDate=$BUILD -X main.Commit=$COMMIT" \
            -o proxy-dispatcher-${{ matrix.suffix }} \
            ./cmd/proxy-dispatcher/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-dispatcher-${{ matrix.suffix }}
          path: proxy-dispatcher-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            proxy-dispatcher-linux-amd64/proxy-dispatcher-linux-amd64
            proxy-dispatcher-linux-arm64/proxy-dispatcher-linux-arm64
          generate_release_notes: true
